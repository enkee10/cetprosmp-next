# ==========================================
# Schema nativo para Firebase Data Connect
# Versión con relaciones nativas @ref
# ==========================================

type User @table(name: "users") {
  id: Int! @col(dataType: "serial")
  documentId: String @col(name: "document_id")
  username: String
  email: String
  provider: String
  confirmed: Boolean
  blocked: Boolean
  dni: String
  tipoDocumento: String @col(name: "tipo_documento")
  nombre: String
  apellidos: String
  apellidoPaterno: String @col(name: "apellido_paterno")
  apellidoMaterno: String @col(name: "apellido_materno")
  sexo: String
  estadoCivil: String @col(name: "estado_civil")
  instruccion: String
  fechaNacimiento: Timestamp @col(name: "fecha_nacimiento")
  direccion: String
  distrito: String
  telefono: String
  celular: String
  correoInstitucional: String @col(name: "correo_institucional")
  fechaCreacion: Timestamp @col(name: "fecha_creacion")
  fechaModificacion: Timestamp @col(name: "fecha_modificacion")
  emailCreador: String @col(name: "email_creador")
  avatar: String

  rol: Rol @ref(fields: "rolId", references: "id")
  rolId: Int @col(name: "rol_id")
}

type Rol @table(name: "roles") {
  id: Int! @col(dataType: "serial")
  titulo: String
  scala: Int
}

type Sector @table(name: "sectores") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String
}

type Familia @table(name: "familias") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String

  sector: Sector @ref(fields: "sectorId", references: "id")
  sectorId: Int @col(name: "sector_id")
}

type Especialidad @table(name: "especialidades") {
  id: Int! @col(dataType: "serial")
  titulo: String
  tituloComercial: String @col(name: "titulo_comercial")
  descripcion: String
  descripcion2: String @col(name: "descripcion_2")
  slug: String

  actEconomica: ActEconomica @ref(fields: "actEconomicaId", references: "id")
  actEconomicaId: Int @col(name: "act_economica_id")
}

type ActEconomica @table(name: "act_economicas") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String

  familia: Familia @ref(fields: "familiaId", references: "id")
  familiaId: Int @col(name: "familia_id")

  # Se conserva porque tu migración dejó este campo.
  # Si luego decides normalizar más, podríamos quitar uno de los dos sentidos.
  especialidad: Especialidad @ref(fields: "especialidadId", references: "id")
  especialidadId: Int @col(name: "especialidad_id")
}

type Carrera @table(name: "carreras") {
  id: Int! @col(dataType: "serial")
  titulo: String
  codigo: String
  descripcion: String
  duracion: String
  creditos: Int
  nivel: String
  tituloComercial: String @col(name: "titulo_comercial")
  slug: String
  descripcion2: String @col(name: "descripcion_2")

  actEconomica: ActEconomica @ref(fields: "actEconomicaId", references: "id")
  actEconomicaId: Int @col(name: "act_economica_id")
}

type Modulo @table(name: "modulos") {
  id: Int! @col(dataType: "serial")
  titulo: String
  tituloComercial: String @col(name: "titulo_comercial")
  orden: Int
  descripcion: String
  horas: Int
  creditos: Int
  metas: Int
  activo: Boolean
  slug: String
  descripcion2: String @col(name: "descripcion_2")

  carrera: Carrera @ref(fields: "carreraId", references: "id")
  carreraId: Int @col(name: "carrera_id")
}

type Personal @table(name: "personales") {
  id: Int! @col(dataType: "serial")
  displayName: String @col(name: "display_name")
  memo: String

  user: User @ref(fields: "userId", references: "id")
  userId: Int @col(name: "user_id")
}

type PersonalEspecialidad @table(name: "personal_especialidades", key: ["personal", "especialidad"]) {
  id: Int! @col(dataType: "serial")

  personal: Personal! @ref(fields: "personalId", references: "id")
  personalId: Int! @col(name: "personal_id")

  especialidad: Especialidad! @ref(fields: "especialidadId", references: "id")
  especialidadId: Int! @col(name: "especialidad_id")

  orden: Int
}

type Semestre @table(name: "semestres") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String
  archivado: Boolean

  director: Personal @ref(fields: "directorId", references: "id")
  directorId: Int @col(name: "director_id")

  coordinador1: Personal @ref(fields: "coordinador1Id", references: "id")
  coordinador1Id: Int @col(name: "coordinador_1_id")

  coordinador2: Personal @ref(fields: "coordinador2Id", references: "id")
  coordinador2Id: Int @col(name: "coordinador_2_id")
}

type Calendario @table(name: "calendarios") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String
  fechaIni: Timestamp @col(name: "fecha_ini")
  fechaFin: Timestamp @col(name: "fecha_fin")
  tipo: String
  archivado: Boolean

  semestre: Semestre @ref(fields: "semestreId", references: "id")
  semestreId: Int @col(name: "semestre_id")
}

type Grupo @table(name: "grupos") {
  id: Int! @col(dataType: "serial")
  turno: String
  descripcion: String
  nombreDisplay: String @col(name: "nombre_display")
  archivado: Boolean

  modulo: Modulo @ref(fields: "moduloId", references: "id")
  moduloId: Int @col(name: "modulo_id")

  calendario: Calendario @ref(fields: "calendarioId", references: "id")
  calendarioId: Int @col(name: "calendario_id")

  personal: Personal @ref(fields: "personalId", references: "id")
  personalId: Int @col(name: "personal_id")
}

type Paquete @table(name: "paquetes") {
  id: Int! @col(dataType: "serial")
  titulo: String
  descripcion: String
  archivado: Boolean
}

type PaqueteGrupo @table(name: "paquete_grupos", key: ["paquete", "grupo"]) {
  id: Int! @col(dataType: "serial")

  paquete: Paquete! @ref(fields: "paqueteId", references: "id")
  paqueteId: Int! @col(name: "paquete_id")

  grupo: Grupo! @ref(fields: "grupoId", references: "id")
  grupoId: Int! @col(name: "grupo_id")

  grupoOrd: Int @col(name: "grupo_ord")
}

type Matricula @table(name: "matriculas") {
  id: Int! @col(dataType: "serial")
  recibo: String
  fecha: Timestamp
  archivado: Boolean
}

type MatriculaUser @table(name: "matricula_users", key: ["matricula", "user"]) {
  id: Int! @col(dataType: "serial")

  matricula: Matricula! @ref(fields: "matriculaId", references: "id")
  matriculaId: Int! @col(name: "matricula_id")

  user: User! @ref(fields: "userId", references: "id")
  userId: Int! @col(name: "user_id")
}

type MatriculaGrupo @table(name: "matricula_grupos", key: ["matricula", "grupo"]) {
  id: Int! @col(dataType: "serial")

  matricula: Matricula! @ref(fields: "matriculaId", references: "id")
  matriculaId: Int! @col(name: "matricula_id")

  grupo: Grupo! @ref(fields: "grupoId", references: "id")
  grupoId: Int! @col(name: "grupo_id")
}

type MatriculaPaquete @table(name: "matricula_paquetes", key: ["matricula", "paquete"]) {
  id: Int! @col(dataType: "serial")

  matricula: Matricula! @ref(fields: "matriculaId", references: "id")
  matriculaId: Int! @col(name: "matricula_id")

  paquete: Paquete! @ref(fields: "paqueteId", references: "id")
  paqueteId: Int! @col(name: "paquete_id")
}

type Publicacion @table(name: "publicaciones") {
  id: Int! @col(dataType: "serial")
  titulo: String
  slug: String
  tipo: String
  descripcionCorta: String @col(name: "descripcion_corta")
  fechaPublicacion: Timestamp @col(name: "fecha_publicacion")
  fechaEventoInicio: Timestamp @col(name: "fecha_evento_inicio")
  fechaEventoFin: Timestamp @col(name: "fecha_evento_fin")
  ubicacion: String
  destacado: Boolean
  contenido1: String @col(name: "contenido_1")
  contenido2: String @col(name: "contenido_2")
}

type Post @table(name: "posts") @unique(fields: ["slug"]) @index(fields: ["tipo", "estado"]) {
  id: Int! @col(dataType: "serial")
  titulo: String! @col(dataType: "varchar(220)")
  slug: String! @col(dataType: "varchar(260)")
  tipo: String! @col(dataType: "varchar(40)")
  contenido: String @col(dataType: "text")
  resumen: String @col(dataType: "text")
  imagenPortadaUrl: String @col(name: "imagen_portada_url", dataType: "text")
  estado: String! @col(dataType: "varchar(40)") @default(value: "borrador")
  comentariosActivos: Boolean! @col(name: "comentarios_activos") @default(value: true)
  entidadTipo: String @col(name: "entidad_tipo", dataType: "varchar(80)")
  entidadId: String @col(name: "entidad_id", dataType: "varchar(120)")
  creadoPorUid: String @col(name: "creado_por_uid", dataType: "varchar(128)")
  fechaCreacion: Timestamp @col(name: "fecha_creacion") @default(expr: "request.time")
  fechaActualizacion: Timestamp @col(name: "fecha_actualizacion") @default(expr: "request.time")
  fechaPublicacion: Timestamp @col(name: "fecha_publicacion")
}

type VideoYoutube @table(name: "videos_youtube") {
  id: Int! @col(dataType: "serial")
  url: String
}

type ModuloVideo @table(name: "modulo_videos") {
  id: Int! @col(dataType: "serial")

  modulo: Modulo @ref(fields: "moduloId", references: "id")
  moduloId: Int @col(name: "modulo_id")

  video: VideoYoutube @ref(fields: "videoId", references: "id")
  videoId: Int @col(name: "video_id")

  field: String
  orden: Int
}

type PublicacionVideo @table(name: "publicacion_videos") {
  id: Int! @col(dataType: "serial")

  publicacion: Publicacion @ref(fields: "publicacionId", references: "id")
  publicacionId: Int @col(name: "publicacion_id")

  video: VideoYoutube @ref(fields: "videoId", references: "id")
  videoId: Int @col(name: "video_id")

  field: String
  orden: Int
}

type DatoGeneral @table(name: "dato_general") {
  id: Int! @col(dataType: "serial")
  nombreInstitucion: String @col(name: "nombre_institucion")
  direccion: String
  telefono1: String @col(name: "telefono_1")
  telefono2: String @col(name: "telefono_2")
  correo: String
  paginaWeb: String @col(name: "pagina_web")
  facebook: String
  youtube: String
  twitter: String
  instagram: String
  tiktok: String
  ruc: String
  rd: String
}
